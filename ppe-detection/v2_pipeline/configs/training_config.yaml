epochs: 100
candidate_epochs: 50
final_epochs: 100
ablation_epochs: 100
imgsz: 640
batch: 24
device: 0
# Windows/Jupyter-safe default. Increase only after confirming dataloader workers
# do not leave orphan processes or crash the kernel.
workers: 8
patience: 20
seed: 42
amp: true
latency_max_images: 20
selected_experiment: exp_D_full_pipeline
final_export_formats:
  - onnx
final_prediction_conf: 0.25

candidate_models:
  - yolov8n.pt
  - yolov9t.pt
  - yolov10n.pt
  - yolo11n.pt
  - yolo12n.pt
  - yolo26n.pt

selection_priority:
  - recall
  - map50
  - map50_95
  - fps
  - model_size
